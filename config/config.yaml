# ─────────────────────────────────────────────────────────────
# Agentic Rare Disease QA Pipeline – Configuration
# ─────────────────────────────────────────────────────────────

# ── LLM ──────────────────────────────────────────────────────
llm:
  provider: openai          # openai | anthropic | ollama
  model: gpt-4o
  temperature: 0.1
  max_tokens: 2048
  api_key: ${OPENAI_API_KEY}   # set via environment variable

  # Anthropic alternative
  anthropic_model: claude-3-5-sonnet-20241022
  anthropic_api_key: ${ANTHROPIC_API_KEY}

  # Local Ollama alternative (no API key needed)
  ollama_base_url: http://localhost:11434
  ollama_model: llama3.2

# ── Embedding ─────────────────────────────────────────────────
embedding:
  provider: openai          # openai | huggingface
  model: text-embedding-3-small
  huggingface_model: BAAI/bge-small-en-v1.5
  dimension: 1536

# ── Vector Store ─────────────────────────────────────────────
vector_store:
  provider: chromadb        # chromadb | faiss | pinecone
  persist_directory: ./data/vector_store
  collection_name: rare_disease_docs
  top_k: 5
  similarity_threshold: 0.7

# ── Memory ────────────────────────────────────────────────────
memory:
  max_history_turns: 10
  history_relevance_threshold: 0.75
  long_term_store: ./data/long_term_memory.json

# ── Web Extraction ────────────────────────────────────────────
web:
  search_provider: serpapi  # serpapi | duckduckgo | tavily
  serpapi_key: ${SERPAPI_API_KEY}
  tavily_key: ${TAVILY_API_KEY}
  max_search_results: 5
  timeout_seconds: 10
  trusted_domains:
    - rarediseases.info.nih.gov
    - nord.org
    - orphanet.net
    - pubmed.ncbi.nlm.nih.gov
    - cla-support.org
    - lymphaticnetwork.org
    - rarediseases.org

# ── MCP (Model Context Protocol) ─────────────────────────────
mcp:
  enabled: true
  server_url: http://localhost:8765
  tools:
    - pubmed_search
    - clinicaltrials_search
    - omim_lookup
    - orphanet_lookup

# ── Planning Agent ────────────────────────────────────────────
planning:
  max_requery_attempts: 2
  route_confidence_threshold: 0.6
  routes:
    - history
    - rag
    - web
    - mcp
    - hybrid      # web + rag combined

# ── RAG ───────────────────────────────────────────────────────
rag:
  chunk_size: 512
  chunk_overlap: 64
  retrieval_strategy: hybrid   # dense | sparse | hybrid
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  use_reranker: true

# ── Logging ───────────────────────────────────────────────────
logging:
  level: INFO
  log_file: ./results/pipeline.log
  trace_agent_steps: true

# ── App ───────────────────────────────────────────────────────
app:
  title: "RareMind – Rare Disease AI Assistant"
  description: "AI-powered Q&A for rare disease patients & families"
  show_reasoning_trace: true
  avatar_user: "🧑"
  avatar_bot: "🩺"
